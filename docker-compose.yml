version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - inventory_net
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/--init--.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory_net
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: inventory_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - inventory_net
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: inventory_redis
    networks:
      - inventory_net
    restart: unless-stopped

  nginx:
    image: nginx:stable
    container_name: inventory_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - inventory_net
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  inventory_net:
    driver: bridge

postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: inventory_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory_net
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: inventory_redis_exporter
    environment:
      REDIS_ADDR: "redis:6379"
    depends_on:
      - redis
    networks:
      - inventory_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: inventory_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - inventory_net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: inventory_alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - inventory_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: inventory_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - inventory_net
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: inventory_loki
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - inventory_net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: inventory_promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - inventory_net
    restart: unless-stopped