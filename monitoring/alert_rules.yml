groups:
  - name: inventory_app_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for over 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(flask_http_request_total{status=~"5.."}[5m]))
          /
          sum(rate(flask_http_request_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on inventory app"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency above 1s"
          description: "95th percentile request latency has exceeded 1 second for 2 minutes."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="flask_app"} > 500000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Flask app memory usage high"
          description: "App process is using more than 500MB of resident memory."
